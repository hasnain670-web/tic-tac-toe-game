<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Advanced Tic Tac Toe</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1>Tic Tac Toe</h1>

        <!-- Winner Message -->
        <div class="msg-container hide">
            <h2 id="msg"></h2>
            <button id="new-game">New Game</button>
        </div>

        <!-- Scoreboard -->
        <div class="score-board">

            <div class="score-card">
                <h3>X Wins</h3>
                <span id="x-score">0</span>
            </div>

            <div class="score-card">
                <h3>Draws</h3>
                <span id="draw-score">0</span>
            </div>

            <div class="score-card">
                <h3>O Wins</h3>
                <span id="o-score">0</span>
            </div>

        </div>

        <!-- Turn Indicator -->
        <h2 id="turn">Player O Turn</h2>

        <!-- Timer -->
        <div class="timer">
            ⏱ Time :
            <span id="time">00:00</span>
        </div>

        <!-- Controls -->
        <div class="controls">

            <select id="game-mode">
                <option value="player">👥 Player vs Player</option>
                <option value="easy">🤖 AI (Easy)</option>
                <option value="hard">🧠 AI (Hard)</option>
            </select>

            <button id="theme-btn">
                🌙 Dark Mode
            </button>

            <button id="music-btn">
                🎵 Music
            </button>

        </div>

        <!-- Game -->
        <div class="container">

            <div class="game">

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

            </div>

        </div>

        <button id="rest-btn">Reset Game</button>
        <button id="reset-score">Reset Score</button>

        <!-- Sounds -->
        <audio id="clickSound" src="assets/click.mp3"></audio>

        <audio id="winnerSound" src="assets/winner.mp3"></audio>

        <audio id="drawSound" src="assets/draw.mp3"></audio>

        <audio id="bgMusic" src="assets/bg-music.mp3" loop></audio>

        <script src="index.js"></script>

    </body>
</html>
